name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27с
          add-to-path: true

      - name: Install Ninja
        run: sudo apt-get install ninja-build

      # Декодируем Keystore из секретов GitHub
      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Release APK
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.abi=arm64-v8a \
            -PreleaseStorePassword=$RELEASE_STORE_PASSWORD \
            -PreleaseKeyAlias=$RELEASE_KEY_ALIAS \
            -PreleaseKeyPassword=$RELEASE_KEY_PASSWORD \
            --no-build-cache --stacktrace

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: tower-defence-android-arm64-v8a-signed
          path: android/app/build/outputs/apk/release/*.apk

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        c_compiler: [clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Install All SFML Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
          libgl1-mesa-dev libglu1-mesa-dev \
          libfreetype-dev \
          libopenal-dev \
          libogg-dev libvorbis-dev libflac-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install flac libogg libvorbis openal-soft

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tower-defence-${{ matrix.os }}-${{ matrix.c_compiler }}
        # Магия '**' позволяет находить файлы в подпапках конфигурации (Release/Debug)
        path: |
          ${{ steps.strings.outputs.build-output-dir }}/**/*.exe
          ${{ steps.strings.outputs.build-output-dir }}/**/tower-defence
          ${{ steps.strings.outputs.build-output-dir }}/**/assets/
          ${{ steps.strings.outputs.build-output-dir }}/**/data/
          ${{ steps.strings.outputs.build-output-dir }}/**/*.app
        if-no-files-found: warn
        include-hidden-files: false