name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
        
      - name: Verify Source Code
        run: |
          echo "=== ПРОВЕРКА КОДА В МЕНЮ ==="
          grep -C 5 "uiView" src/Menu.cpp || echo "uiView НЕ НАЙДЕН В КОДЕ!"
          echo "=== ПРОВЕРКА КОДА В ГЕЙМЕ ==="
          grep "camera" src/Game.cpp || echo "CameraManager НЕ НАЙДЕН!"
          echo "=== ТЕКУЩИЙ ХЭШ И СООБЩЕНИЕ ==="
          git log -1

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r23c
          add-to-path: true

      - name: Install Ninja
        run: sudo apt-get install ninja-build

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build with Gradle
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd android
          rm -rf .gradle
          rm -rf app/build
          rm -rf app/.cxx
          rm -rf app/src/main/jniLibs
          chmod +x gradlew
          ./gradlew assembleDebug --no-build-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tower-defence-android-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug//.apk
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        # Оставляем clang и cl как основные
        c_compiler: [clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Install All SFML Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libx11-dev libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
          libgl1-mesa-dev libglu1-mesa-dev \
          libfreetype-dev \
          libopenal-dev \
          libogg-dev libvorbis-dev libflac-dev \
          libwayland-dev libxkbcommon-dev wayland-protocols

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install flac libogg libvorbis openal-soft

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tower-defence-${{ matrix.os }}-${{ matrix.c_compiler }}
        path: |
          ${{ steps.strings.outputs.build-output-dir }}//tower-defence.exe
          ${{ steps.strings.outputs.build-output-dir }}//tower-defence
          ${{ steps.strings.outputs.build-output-dir }}//assets/
          ${{ steps.strings.outputs.build-output-dir }}//data/
          ${{ steps.strings.outputs.build-output-dir }}//*.app
        include-hidden-files: false
